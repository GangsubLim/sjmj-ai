name: CI

on:
  pull_request:
    branches: [main, devel]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.15.12
          args: check --output-format=github
          src: apps/invoice-ocr/backend
      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.15.12
          args: format --check
          src: apps/invoice-ocr/backend

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/invoice-ocr/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/invoice-ocr/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: Vitest
        run: npx vitest run --passWithNoTests
      - name: Build
        run: npm run build

  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/invoice-ocr/backend
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ci_root_pw
          MYSQL_DATABASE: sjmj_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pci_root_pw"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Pytest with coverage
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_NAME: sjmj_test
          DB_USER: root
          DB_PASS: ci_root_pw
        run: uv run pytest -q --cov=app --cov-report=term-missing --cov-fail-under=80
